<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>◈ 96_2 • Template 11 ◈</title>
<style>
  :root{
    --bg:#0a0e1a; --tile-on:#3ec7c2; --tile-off:#1a2640;
    --ink:#e8eef8; --muted:#9fb3c8; --digit-ink:#e7f0ff; --gap:10px;
    --glow:#3ec7c2aa;
  }
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family: 'Inter', 'Segoe UI', system-ui, Roboto, Helvetica, Arial;
    display:flex; flex-direction:column; align-items:center;
    -webkit-tap-highlight-color: transparent;
  }
  h1{
    font-size:18px; font-weight:700; margin:10px 0 8px; 
    background:linear-gradient(135deg, #c0e4ff, #7bc5c0); -webkit-background-clip:text; background-clip:text; color:transparent; 
    letter-spacing:1px;
  }
  #frame{display:flex; flex-direction:column; align-items:center}
  .hud{
    width:100%; box-sizing:border-box; display:flex; flex-direction:column; gap:6px; 
    background:rgba(10,14,26,0.65); backdrop-filter:blur(3px); border-radius:28px; 
    padding:8px 18px; margin-bottom:6px; border:1px solid rgba(62,199,194,0.3);
  }
  .row{
    display:flex; align-items:baseline; gap:12px; background:#11161f; 
    padding:4px 18px; border-radius:40px; justify-content:space-between;
  }
  .row .label{white-space:nowrap; font-weight:600; color:#bfd9ff; letter-spacing:0.5px;}
  .value{
    display:block; font-family:'JetBrains Mono', monospace; font-weight:800; 
    font-size:22px; color:#b9f3f0; min-width:100px; text-align:right;
    word-break:break-word; white-space:normal;
  }
  canvas{display:block; position:relative; filter:drop-shadow(0 8px 12px rgba(0,0,0,0.5));}
  .bar{
    width:100%; display:flex; justify-content:center; gap:var(--gap); flex-wrap:wrap; 
    background:rgba(6,10,20,0.6); backdrop-filter:blur(8px); border-radius:60px; 
    padding:8px 12px; margin-top:12px;
  }
  button{
    margin:0; padding:0; border:none; border-radius:0px;
    background:var(--tile-off); color:var(--digit-ink); font-weight:700;
    touch-action:manipulation; user-select:none;
    width:64px; height:64px; min-width:unset; display:flex; align-items:center; justify-content:center;
    transition: all 0.08s cubic-bezier(0.2,0.9,0.4,1.1);
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
  }
  button:active{ transform:scale(0.94);}
  .btn-on{ background:var(--tile-on)!important; color:#0a1320!important; box-shadow:0 0 8px var(--glow); }
  @media (max-width:500px){ 
    .hud{ padding:6px 12px; gap:5px;} 
    .row{ padding:2px 12px; gap:8px;} 
    .value{font-size:18px; min-width:70px;} 
    h1{font-size:15px;} 
  }
</style>
</head>
<body>
<h1>◈ 96_2 • Template 11 ◈</h1>
<div id="frame">
  <div class="hud" id="hud">
    <div class="row">
      <span class="label"> ✦ Step</span>
      <div id="sValue" class="value">0</div>
    </div>
    <div class="row">
      <span class="label"> ⚡ Score</span>
      <div id="mValue" class="value">0</div>
    </div>
  </div>
  <canvas id="stage" aria-label="8x12 Halo szimbólumrács"></canvas>
  <div class="bar">
    <button id="n0" aria-label="N0">N0</button>
    <button id="n1" aria-label="N1">N1</button>
    <button id="n2" aria-label="N2">N2</button>
    <button id="n3" aria-label="N3">N3</button>
    <button id="n4" aria-label="N4">N4</button>
    <button id="n5" aria-label="N5">N5</button>
    <button id="n6" aria-label="N6">N6</button>
    <button id="n7" aria-label="N7">N7</button>
    <button id="autoToggle" aria-label="Auto Random Toggle">⦿ R ⦿</button>
  </div>
</div>
<script>
(()=> {
  const COLS=8, ROWS=12;         // 8x12 = 96 cella → 96 különböző ikon
  const DPR=Math.max(1, Math.min(window.devicePixelRatio||1, 2));
  const canvas=document.getElementById('stage');
  const ctx=canvas.getContext('2d');
  const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const COLORS={ BG:css('--bg'), ON:css('--tile-on'), OFF:css('--tile-off'), INK:css('--ink'), DIGIT_INK:css('--digit-ink') };
  const grid={ cols:COLS, rows:ROWS, size:0, pad:10, radius:0 };
  
  // ========== 96 EGYEDI HALO-STÍLUSÚ SZIMBÓLUM KÉSZLET ==========
  const HALO_GLYPHS = [
   "00", "00", "00", "00", "00", "00", "00", "00", 
   "01", "01", "01", "01", "01", "01", "01", "01",
   "02", "02", "02", "02", "02", "02", "02", "02",
   "03", "03", "03", "03", "03", "03", "03", "03",
   "04", "04", "04", "04", "04", "04", "04", "04", 
   "05", "05", "05", "05", "05", "05", "05", "05",
   "06", "06", "06", "06", "06", "06", "06", "06",
   "07", "07", "07", "07", "07", "07", "07", "07",
   "08", "08", "08", "08", "08", "08", "08", "08",
   "09", "09", "09", "09", "09", "09", "09", "09",
   "0a", "0a", "0a", "0a", "0a", "0a", "0a", "0a",
   "0b", "0b", "0b", "0b", "0b", "0b", "0b", "0b",
  ];
  while(HALO_GLYPHS.length < 96) HALO_GLYPHS.push("⦿");
  const UNIQUE_SYMBOLS = HALO_GLYPHS.slice(0, 96);
  
  function getCellSymbol(row, col){
    const idx = (row * COLS + col) % 96;
    return UNIQUE_SYMBOLS[idx];
  }
  
  function emptyMatrix(){ return Array.from({length:grid.rows},()=>Array(grid.cols).fill(false)); }
  const defaultBoardState = ()=>({ matrix: emptyMatrix(), step: "0", score: "0" });
  const TOTAL_STATES = 256;
  let boardsState = Array.from({length:TOTAL_STATES}, defaultBoardState);
  let activeButtons = [false, false, false, false, false, false, false, false];
  let viewIndex = 0;
  let autoToggleInterval = null;
  let isAutoToggleActive = false;

  const elM=document.getElementById('mValue');
  const elS=document.getElementById('sValue');
  const hud=document.getElementById('hud');
  const frame=document.getElementById('frame');
  const btns=[
    document.getElementById('n0'), document.getElementById('n1'), document.getElementById('n2'),
    document.getElementById('n3'), document.getElementById('n4'), document.getElementById('n5'),
    document.getElementById('n6'), document.getElementById('n7'), document.getElementById('autoToggle')
  ];

  // ---------- BIG INTEGER HELPER (pont és lépéskezelés) ----------
  const stripZeros = (s)=>{
    let t = (s||'0').replace(/^(-?)0+(?=\d)/, '$1');
    return t === '' ? '0' : t;
  };
  const splitSign = (s)=> s[0]==='-' ? [-1, s.slice(1)] : [1, s];
  const cmpAbs = (a,b)=>{
    if (a.length!==b.length) return a.length - b.length;
    if (a===b) return 0;
    return a<b ? -1 : 1;
  };
  const addAbs = (a,b)=>{
    a = stripZeros(a); b = stripZeros(b);
    let res='',carry=0,i=a.length-1,j=b.length-1;
    while(i>=0||j>=0||carry){
      const da=i>=0?(a.charCodeAt(i)-48):0;
      const db=j>=0?(b.charCodeAt(j)-48):0;
      const s=da+db+carry;
      res=(s%10)+res; carry=(s/10)|0; i--; j--;
    }
    return stripZeros(res);
  };
  const subAbs = (a,b)=>{ 
    a = stripZeros(a); b = stripZeros(b);
    let res='',borrow=0,i=a.length-1,j=b.length-1;
    while(i>=0){
      let da=a.charCodeAt(i)-48-borrow;
      const db=j>=0?(b.charCodeAt(j)-48):0;
      if(da<db){ da+=10; borrow=1; } else borrow=0;
      res=(da-db)+res; i--; j--;
    }
    return stripZeros(res.replace(/^0+(?=\d)/,''));
  };
  const addSigned = (A, B)=>{
    let [sa, a] = splitSign(stripZeros(A));
    let [sb, b] = splitSign(stripZeros(B));
    if (a==='0' && sa===1) return (sb<0?'-':'')+b;
    if (b==='0' && sb===1) return (sa<0?'-':'')+a;
    if (sa===sb){
      const s = addAbs(a,b);
      return (sa<0?'-':'')+s;
    } else {
      const cmp = cmpAbs(a,b);
      if (cmp===0) return '0';
      if (cmp>0){
        const s = subAbs(a,b);
        return (sa<0?'-':'')+s;
      } else {
        const s = subAbs(b,a);
        return (sb<0?'-':'')+s;
      }
    }
  };
  const incUnsigned = (A)=> stripZeros(addAbs(stripZeros(A), '1'));
  const halfUnsigned = (A)=>{
    A = stripZeros(A);
    let res = '';
    let carry = 0;
    for (let i=0;i<A.length;i++){
      const n = carry*10 + (A.charCodeAt(i)-48);
      const q = (n/2)|0;
      res += String(q);
      carry = n % 2;
    }
    return stripZeros(res);
  };

  const isBoardEmpty = (m)=>{
    for(let r=0;r<m.length;r++) for(let c=0;c<m[r].length;c++) if(m[r][c]) return false;
    return true;
  };

  function maskFromButtons(){
    let mask = 0;
    for(let i=0;i<activeButtons.length;i++) if(activeButtons[i]) mask |= (1 << i);
    return mask;
  }

  function adjustFontSize(el, text){
    if(!el) return;
    const container = el.parentElement;
    if(!container) return;
    const containerWidth = container.clientWidth - 20;
    if(containerWidth <= 0) return;
    let fontSize = 22;
    if(window.innerWidth <= 500) fontSize = 18;
    if(window.innerWidth <= 420) fontSize = 16;
    const testSpan = document.createElement('span');
    testSpan.style.cssText = `font-family:'JetBrains Mono', monospace; font-weight:800; white-space:nowrap; position:absolute; visibility:hidden; font-size:${fontSize}px;`;
    testSpan.innerText = text;
    document.body.appendChild(testSpan);
    let textWidth = testSpan.offsetWidth;
    while(textWidth > containerWidth && fontSize > 12){
      fontSize--;
      testSpan.style.fontSize = fontSize + 'px';
      textWidth = testSpan.offsetWidth;
    }
    document.body.removeChild(testSpan);
    el.style.fontSize = fontSize + 'px';
    el.style.whiteSpace = 'normal';
    el.style.wordBreak = 'break-word';
  }

  function renderValue(el, v){
    el.innerHTML = v;
    adjustFontSize(el, v);
  }
  
  function syncHUD(){ 
    const b = boardsState[viewIndex];
    if(b){
      renderValue(elM, b.score);
      renderValue(elS, b.step);
    } else {
      renderValue(elM, "0");
      renderValue(elS, "0");
    }
  }

  function toggleCell(r,c){
    const b = boardsState[viewIndex];
    if(!b) return;
    const wasOn = b.matrix[r][c];
    b.matrix[r][c] = !wasOn;
    b.step = incUnsigned(b.step);
    b.score = wasOn ? addSigned(b.score, "2") : addSigned(b.score, "-1");
    if (isBoardEmpty(b.matrix) && b.step !== "0"){
      b.score = halfUnsigned(b.step);
    }
    syncHUD();
    draw();
  }

  function toggleRandomCell() {
    if (!isAutoToggleActive) return;
    const r = Math.floor(Math.random() * grid.rows);
    const c = Math.floor(Math.random() * grid.cols);
    toggleCell(r, c);
  }

  function startAutoToggle() {
    if (autoToggleInterval) return;
    isAutoToggleActive = true;
    autoToggleInterval = setInterval(toggleRandomCell, 200);
  }
  function stopAutoToggle() {
    isAutoToggleActive = false;
    if (autoToggleInterval) { clearInterval(autoToggleInterval); autoToggleInterval = null; }
  }
  function toggleAutoMode() {
    if (isAutoToggleActive) stopAutoToggle();
    else startAutoToggle();
    renderButtons();
  }

  function rr(x,y,w,h,r){ const a=Math.min(r,w/2,h/2);
    ctx.beginPath(); ctx.moveTo(x+a,y); ctx.arcTo(x+w,y,x+w,y+h,a);
    ctx.arcTo(x+w,y+h,x,y+h,a); ctx.arcTo(x,y+h,x,y,a); ctx.arcTo(x,y,x+w,y,a); ctx.closePath();
  }
  
  function drawHaloGlyph(cx, cy, symbol, isOn){
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const fontSize = Math.max(20, Math.floor(grid.size * 0.52));
    ctx.font = `500 ${fontSize}px "Segoe UI Symbol", "Apple Symbols", "Noto Sans Symbols2", "Inter"`;
    if(isOn){
      ctx.shadowBlur = 8;
      ctx.shadowColor = "#3ec7c2";
      ctx.fillStyle = "#07121f";
    } else {
      ctx.shadowBlur = 2;
      ctx.shadowColor = "#3ec7c280";
      ctx.fillStyle = COLORS.DIGIT_INK;
    }
    ctx.fillText(symbol, cx, cy);
    ctx.shadowBlur = 0;
    // A FEHÉR PONT ITT ELTÁVOLÍTÁSRA KERÜLT
  }
  
  function draw(){
    const b = boardsState[viewIndex];
    if(!b) return;
    ctx.fillStyle=COLORS.BG; ctx.fillRect(0,0,canvas.width/DPR,canvas.height/DPR);
    for(let r=0;r<grid.rows;r++){
      for(let c=0;c<grid.cols;c++){
        const x=c*(grid.size+grid.pad)+grid.pad, y=r*(grid.size+grid.pad)+grid.pad;
        rr(x,y,grid.size,grid.size,grid.radius);
        const on=b.matrix[r][c]; 
        ctx.fillStyle=on?COLORS.ON:COLORS.OFF; 
        ctx.fill();
        ctx.strokeStyle = on ? 'rgba(80,230,210,0.8)' : 'rgba(80,140,210,0.3)';
        ctx.lineWidth = 1.2;
        rr(x+1.5, y+1.5, grid.size-3, grid.size-3, grid.radius-2);
        ctx.stroke();
        
        const symbol = getCellSymbol(r,c);
        const centerX = x + grid.size/2;
        const centerY = y + grid.size/2;
        drawHaloGlyph(centerX, centerY, symbol, on);
        

      }
    }
  }
  
  function pointerXY(e){ const rect=canvas.getBoundingClientRect(); const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left; const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top; return {x,y}; }
  function toggleAt(x,y){
    for(let r=0;r<grid.rows;r++){
      for(let c=0;c<grid.cols;c++){
        const cx=c*(grid.size+grid.pad)+grid.pad, cy=r*(grid.size+grid.pad)+grid.pad;
        if(x>=cx && x<=cx+grid.size && y>=cy && y<=cy+grid.size){ toggleCell(r,c); return; }
      }
    }
  }
  canvas.addEventListener('click', e=>{ const p=pointerXY(e); toggleAt(p.x,p.y); });
  let touchMoved=false;
  canvas.addEventListener('touchstart', ()=>{ touchMoved=false; }, {passive:true});
  canvas.addEventListener('touchmove',  ()=>{ touchMoved=true;  }, {passive:true});
  canvas.addEventListener('touchend',   e=>{ if(!touchMoved){ const p=pointerXY(e); toggleAt(p.x,p.y); } }, {passive:true});

  function renderButtons(){ 
    for(let i=0;i<8;i++){
      const btn = btns[i];
      if(btn){
        const on = !!activeButtons[i];
        btn.classList.toggle('btn-on', on); 
        btn.setAttribute('aria-pressed', String(on)); 
        btn.style.background = on ? COLORS.ON : COLORS.OFF;
        btn.style.color = on ? '#0a1320' : COLORS.DIGIT_INK;
      }
    }
    const autoBtn = btns[8];
    if(autoBtn){
      const on = isAutoToggleActive;
      autoBtn.classList.toggle('btn-on', on);
      autoBtn.setAttribute('aria-pressed', String(on));
      autoBtn.style.background = on ? COLORS.ON : COLORS.OFF;
      autoBtn.style.color = on ? '#0a1320' : COLORS.DIGIT_INK;
    }
  }

  function pressButton(index){
    if (index === 8) { 
      toggleAutoMode();
    } else {
      activeButtons[index] = !activeButtons[index];
      renderButtons();
      const newMask = maskFromButtons();
      viewIndex = newMask;
      if(!boardsState[viewIndex]) { boardsState[viewIndex] = defaultBoardState(); }
      syncHUD();
      draw();
    }
  }

  btns.forEach((btn, i)=>{
    if(btn){
      btn.addEventListener('click', (e)=>{ e.preventDefault(); pressButton(i); });
      btn.addEventListener('touchend', (e)=>{ e.preventDefault(); pressButton(i); }, {passive:false});
    }
  });

  function fitCanvas(){
    const outer=18, h1=document.querySelector('h1'), bar=document.querySelector('.bar');
    const h1H=h1?h1.getBoundingClientRect().height:0;
    const hudH=hud?hud.getBoundingClientRect().height:0;
    const barH=bar?bar.getBoundingClientRect().height:0;
    const safetyY=18;
    const maxW=Math.max(320, window.innerWidth-outer*2);
    const maxH=Math.max(280, window.innerHeight-(h1H+hudH+barH+safetyY+outer*2));
    grid.pad=Math.round(Math.max(8, Math.min(16, Math.min(maxW,maxH)*0.022)));
    const sizeFromW=Math.floor((maxW-(grid.pad*(grid.cols+1)))/grid.cols);
    const sizeFromH=Math.floor((maxH-(grid.pad*(grid.rows+1)))/grid.rows);
    const MAX_TILE=Math.min(92, Math.floor(window.innerWidth/5.2));
    grid.size=Math.min(MAX_TILE, Math.max(26, Math.min(sizeFromW,sizeFromH)));
    grid.radius = Math.max(6, Math.min(16, Math.floor(grid.size * 0.16)));
    const cssW=grid.cols*(grid.size+grid.pad)+grid.pad;
    const cssH=grid.rows*(grid.size+grid.pad)+grid.pad;
    frame.style.width=cssW+'px';
    canvas.style.width=cssW+'px';
    canvas.style.height=cssH+'px';
    canvas.width=Math.round(cssW*DPR);
    canvas.height=Math.round(cssH*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    document.documentElement.style.setProperty('--gap', grid.pad + 'px');
    const tileFont = Math.max(16, Math.floor(grid.size*0.42)) + 'px';
    btns.forEach(btn=>{
      if(btn){
        btn.style.width = grid.size + 'px';
        btn.style.height = grid.size + 'px';
        btn.style.borderRadius = Math.max(5, grid.radius) + 'px';
        btn.style.fontSize = tileFont;
        btn.style.fontWeight = '700';
      }
    });
    draw();
    const b = boardsState[viewIndex];
    if(b){
      adjustFontSize(elM, b.score);
      adjustFontSize(elS, b.step);
    }
  }

  // INICIALIZÁLÁS (mentés nélkül, teljesen tiszta állapot)
  function fullInit() {
    // Teljesen új állapotok létrehozása minden betöltéskor
    boardsState = Array.from({length:TOTAL_STATES}, defaultBoardState);
    activeButtons = [false, false, false, false, false, false, false, false];
    viewIndex = 0;
    
    renderButtons();
    syncHUD();
    setTimeout(() => { fitCanvas(); }, 0);
    setTimeout(() => { fitCanvas(); }, 100);
  }

  window.addEventListener('resize', () => {
    fitCanvas();
    const b = boardsState[viewIndex];
    if(b){
      adjustFontSize(elM, b.score);
      adjustFontSize(elS, b.step);
    }
  });
  window.addEventListener('orientationchange', () => setTimeout(() => {
    fitCanvas();
    const b = boardsState[viewIndex];
    if(b){
      adjustFontSize(elM, b.score);
      adjustFontSize(elS, b.step);
    }
  }, 30));
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fullInit);
  } else {
    fullInit();
  }
  window.addEventListener('load', () => fitCanvas());
})();
</script>
</body>
</html>
