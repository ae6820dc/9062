<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>96 v1</title>
<style>
  :root{
    --bg:#0f1420; --tile-on:#3ec7c2; --tile-off:#2a3550;
    --ink:#e8eef8; --muted:#9fb3c8; --digit-ink:#e7f0ff; --gap:10px;
  }
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family: Inter, system-ui, Segoe UI, Roboto, Helvetica, Arial;
    display:flex; flex-direction:column; align-items:center;
    -webkit-tap-highlight-color: transparent;
  }
  h1{font-size:18px; font-weight:700; margin:10px 0 8px}
  #frame{display:flex; flex-direction:column; align-items:center}
  .hud{width:100%; box-sizing:border-box; display:flex; flex-direction:column; gap:6px; color:var(--muted); font-size:20px; padding:0 4px;}
  .row{display:flex; align-items:baseline; gap:8px; min-width:0}
  .row .label{white-space:nowrap}
  .value{display:block; width:100%; overflow-x:auto; white-space:nowrap; padding-bottom:2px; border-bottom:1px dashed rgba(231,240,255,0.2);}  
  canvas{display:block; position:relative}
  .bar{width:100%; display:flex; justify-content:center; gap:var(--gap); flex-wrap:wrap}
  button{
    margin:12px 0 14px; padding:0; border:none; border-radius:0px;
    background:var(--tile-off); color:var(--digit-ink); font-weight:700;
    touch-action:manipulation; user-select:none;
    width:64px; height:64px; min-width:unset; display:flex; align-items:center; justify-content:center;
  }
  .btn-on{ background:var(--tile-on)!important; color:#0a1320!important; }
  @media (max-width:420px){ .hud{font-size:18px; gap:5px; padding:0 2px} h1{font-size:16px} }
  .hud, .hud .label, .value .real { color: var(--ink); font-weight:700; }
</style>
</head>
<body>
<h1>96 v1</h1>
<div id="frame">
  <div class="hud" id="hud">
    <div class="row">
      <span class="label">Step:</span>
      <div id="sValue" class="value" aria-label="Step counter"><span class="real">0</span></div>
    </div>
    <div class="row">
      <span class="label">Score:</span>
      <div id="mValue" class="value" aria-label="Score counter"><span class="real">0</span></div>
    </div>
  </div>
  <canvas id="stage" aria-label="8×12 toggleable grid"></canvas>
  <div class="bar">
    <!-- 8 db N gomb: N0 .. N7 -->
    <button id="n0" aria-label="N0" aria-pressed="false">N0</button>
    <button id="n1" aria-label="N1" aria-pressed="false">N1</button>
    <button id="n2" aria-label="N2" aria-pressed="false">N2</button>
    <button id="n3" aria-label="N3" aria-pressed="false">N3</button>
    <button id="n4" aria-label="N4" aria-pressed="false">N4</button>
    <button id="n5" aria-label="N5" aria-pressed="false">N5</button>
    <button id="n6" aria-label="N6" aria-pressed="false">N6</button>
    <button id="n7" aria-label="N7" aria-pressed="false">N7</button>
    <button id="autoToggle" aria-label="Auto Random Toggle" aria-pressed="false">R</button>
  </div>
</div>
<script>
(()=> {
  const COLS=8, ROWS=12;  // 8×12 rács
  const DPR=Math.max(1, Math.min(window.devicePixelRatio||1, 2));
  const canvas=document.getElementById('stage');
  const ctx=canvas.getContext('2d');
  const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const COLORS={ BG:css('--bg'), ON:css('--tile-on'), OFF:css('--tile-off'), INK:css('--ink'), DIGIT_INK:css('--digit-ink') };
  const grid={ cols:COLS, rows:ROWS, size:0, pad:10, radius:0 };
  function emptyMatrix(){ return Array.from({length:grid.rows},()=>Array(grid.cols).fill(false)); }
  const defaultBoardState = ()=>({ matrix: emptyMatrix(), step: "0", score: "0" });
  // 16 állapot (0..15) – 4 bit helyett most 8 N gomb miatt 8 aktív bit? Valójában 8 gomb -> 2^8 = 256 kombináció.
  // De a logika: viewIndex = bits from N0..N7 -> 0..255. De a korábbi kód 16 állapotú volt, most 256-ra bővítjük.
  // Mivel a feladat "bővítsd további 4 N gombbal" (összesen 8) és funkciókat bővítsd, de mást ne változtass.
  // Így megtartjuk a memóriát mind a 256 állapothoz (0..255). A régi 16 helyett 256 boardState.
  // De a localstorage is bővíthető. Továbbá a button mask most 8 bit, viewIndex a teljes bitszekvencia.
  // A feladat nem tiltja a bővítést, és a megjelenítés, játékmenet tökéletes marad.
  const TOTAL_STATES = 256;     // 2^8 = 256 (8 aktív gomb)
  let boardsState = Array.from({length:TOTAL_STATES}, defaultBoardState);
  let activeButtons = [false, false, false, false, false, false, false, false]; // 8 db N gomb állapota
  let viewIndex = 0;            // 0..255, a bitszelekció indexe
  let autoToggleInterval = null;
  let isAutoToggleActive = false;

  const elM=document.getElementById('mValue');
  const elS=document.getElementById('sValue');
  const hud=document.getElementById('hud');
  const frame=document.getElementById('frame');
  // 9 gomb: N0..N7 + autoToggle
  const btns=[
    document.getElementById('n0'),
    document.getElementById('n1'),
    document.getElementById('n2'),
    document.getElementById('n3'),
    document.getElementById('n4'),
    document.getElementById('n5'),
    document.getElementById('n6'),
    document.getElementById('n7'),
    document.getElementById('autoToggle'),
  ];

  const STORAGE_KEY=`v355_sync_on_empty_8x12_combo256_8N`;

  // ---------- Big integer helpers (teljesen eredeti, változatlan) ----------
  const stripZeros = (s)=>{
    let t = (s||'0').replace(/^(-?)0+(?=\d)/, '$1');
    return t === '' ? '0' : t;
  };
  const splitSign = (s)=> s[0]==='-' ? [-1, s.slice(1)] : [1, s];
  const cmpAbs = (a,b)=>{
    if (a.length!==b.length) return a.length - b.length;
    if (a===b) return 0;
    return a<b ? -1 : 1;
  };
  const addAbs = (a,b)=>{
    a = stripZeros(a); b = stripZeros(b);
    let res='',carry=0,i=a.length-1,j=b.length-1;
    while(i>=0||j>=0||carry){
      const da=i>=0?(a.charCodeAt(i)-48):0;
      const db=j>=0?(b.charCodeAt(j)-48):0;
      const s=da+db+carry;
      res=(s%10)+res; carry=(s/10)|0; i--; j--;
    }
    return stripZeros(res);
  };
  const subAbs = (a,b)=>{ 
    a = stripZeros(a); b = stripZeros(b);
    let res='',borrow=0,i=a.length-1,j=b.length-1;
    while(i>=0){
      let da=a.charCodeAt(i)-48-borrow;
      const db=j>=0?(b.charCodeAt(j)-48):0;
      if(da<db){ da+=10; borrow=1; } else borrow=0;
      res=(da-db)+res; i--; j--;
    }
    return stripZeros(res.replace(/^0+(?=\d)/,''));
  };
  const addSigned = (A, B)=>{
    let [sa, a] = splitSign(stripZeros(A));
    let [sb, b] = splitSign(stripZeros(B));
    if (a==='0' && sa===1) return (sb<0?'-':'')+b;
    if (b==='0' && sb===1) return (sa<0?'-':'')+a;
    if (sa===sb){
      const s = addAbs(a,b);
      return (sa<0?'-':'')+s;
    } else {
      const cmp = cmpAbs(a,b);
      if (cmp===0) return '0';
      if (cmp>0){
        const s = subAbs(a,b);
        return (sa<0?'-':'')+s;
      } else {
        const s = subAbs(b,a);
        return (sb<0?'-':'')+s;
      }
    }
  };
  const incUnsigned = (A)=> stripZeros(addAbs(stripZeros(A), '1'));
  const halfUnsigned = (A)=>{
    A = stripZeros(A);
    let res = '';
    let carry = 0;
    for (let i=0;i<A.length;i++){
      const n = carry*10 + (A.charCodeAt(i)-48);
      const q = (n/2)|0;
      res += String(q);
      carry = n % 2;
    }
    return stripZeros(res);
  };

  const isBoardEmpty = (m)=>{
    for(let r=0;r<m.length;r++){
      for(let c=0;c<m[r].length;c++){
        if(m[r][c]) return false;
      }
    }
    return true;
  };

  // mask from 8 buttons (bits 0..7)
  function maskFromButtons(){
    let mask = 0;
    for(let i=0;i<activeButtons.length;i++){
      if(activeButtons[i]) mask |= (1 << i);
    }
    return mask; // 0..255
  }

  function renderValue(el, v){
    el.innerHTML='<span class="real">'+v+'</span>';
    requestAnimationFrame(()=>{ el.scrollLeft=el.scrollWidth; });
  }
  function syncHUD(){ 
    const b = boardsState[viewIndex];
    if(b){
      renderValue(elM, b.score);
      renderValue(elS, b.step);
    } else {
      // biztonsági réteg
      renderValue(elM, "0");
      renderValue(elS, "0");
    }
    saveState(); 
  }

  function toggleCell(r,c){
    const b = boardsState[viewIndex];
    if(!b) return;
    const wasOn = b.matrix[r][c];
    b.matrix[r][c] = !wasOn;

    // Step +1
    b.step = incUnsigned(b.step);

    // Score: off -> +2 , on -> -1 (eredeti :)
    b.score = wasOn ? addSigned(b.score, "2") : addSigned(b.score, "-1");

    // Ha a tábla teljesen üres és step != "0"
    if (isBoardEmpty(b.matrix) && b.step !== "0"){
      b.score = halfUnsigned(b.step);
    }

    syncHUD();
    draw();
  }

  // Automatikus random kapcsolgató (eredeti logika)
  function toggleRandomCell() {
    if (!isAutoToggleActive) return;
    const r = Math.floor(Math.random() * grid.rows);
    const c = Math.floor(Math.random() * grid.cols);
    toggleCell(r, c);
  }

  function startAutoToggle() {
    if (autoToggleInterval) return;
    isAutoToggleActive = true;
    autoToggleInterval = setInterval(toggleRandomCell, 200); // 200ms, mint korábban
  }

  function stopAutoToggle() {
    isAutoToggleActive = false;
    if (autoToggleInterval) {
      clearInterval(autoToggleInterval);
      autoToggleInterval = null;
    }
  }

  function toggleAutoMode() {
    if (isAutoToggleActive) {
      stopAutoToggle();
    } else {
      startAutoToggle();
    }
    renderButtons();
  }

  // Rajzolás: hexa számjegy marad (0-F), minden cella index modulo 16, az megváltozatlan
  function rr(x,y,w,h,r){ const a=Math.min(r,w/2,h/2);
    ctx.beginPath(); ctx.moveTo(x+a,y); ctx.arcTo(x+w,y,x+w,y+h,a);
    ctx.arcTo(x+w,y+h,x,y+h,a); ctx.arcTo(x,y+h,x,y,a); ctx.arcTo(x,y,x+w,y,a); ctx.closePath();
  }
  function drawHex(cx,cy,txt,isOn){
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='700 '+Math.max(16,Math.floor(grid.size*0.42))+'px Inter, system-ui, Segoe UI, Roboto, Helvetica, Arial';
    ctx.fillStyle=isOn?'#0a1320':COLORS.DIGIT_INK;
    ctx.fillText(txt,cx,cy);
  }
  function draw(){
    const b = boardsState[viewIndex];
    if(!b) return;
    ctx.fillStyle=COLORS.BG; ctx.fillRect(0,0,canvas.width/DPR,canvas.height/DPR);
    for(let r=0;r<grid.rows;r++){
      for(let c=0;c<grid.cols;c++){
        const idx=r*grid.cols+c;
        const hex=(idx % 16).toString(16).toUpperCase();
        const x=c*(grid.size+grid.pad)+grid.pad, y=r*(grid.size+grid.pad)+grid.pad;
        rr(x,y,grid.size,grid.size,grid.radius);
        const on=b.matrix[r][c]; ctx.fillStyle=on?COLORS.ON:COLORS.OFF; ctx.fill(); 
        drawHex(x+grid.size/2, y+grid.size/2, hex, on);
      }
    }
  }
  function pointerXY(e){ const rect=canvas.getBoundingClientRect(); const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left; const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top; return {x,y}; }
  function toggleAt(x,y){
    for(let r=0;r<grid.rows;r++){
      for(let c=0;c<grid.cols;c++){
        const cx=c*(grid.size+grid.pad)+grid.pad, cy=r*(grid.size+grid.pad)+grid.pad;
        if(x>=cx && x<=cx+grid.size && y<=cy+grid.size && y>=cy){ toggleCell(r,c); return; }
      }
    }
  }
  canvas.addEventListener('click', e=>{ const p=pointerXY(e); toggleAt(p.x,p.y); });
  let touchMoved=false;
  canvas.addEventListener('touchstart', ()=>{ touchMoved=false; }, {passive:true});
  canvas.addEventListener('touchmove',  ()=>{ touchMoved=true;  }, {passive:true});
  canvas.addEventListener('touchend',   e=>{ if(!touchMoved){ const p=pointerXY(e); toggleAt(p.x,p.y); } }, {passive:true});

  // Gombok kinézetének frissítése (N0..N7 + R)
  function renderButtons(){ 
    // N0..N7 (8 db) + autoToggle (utolsó)
    for(let i=0;i<8;i++){
      const btn = btns[i];
      if(btn){
        const on = !!activeButtons[i];
        btn.classList.toggle('btn-on', on); 
        btn.setAttribute('aria-pressed', String(on)); 
        btn.style.background = on ? COLORS.ON : COLORS.OFF;
        btn.style.color = on ? '#0a1320' : COLORS.DIGIT_INK;
      }
    }
    // autoToggle gomb (index 8)
    const autoBtn = btns[8];
    if(autoBtn){
      const on = isAutoToggleActive;
      autoBtn.classList.toggle('btn-on', on);
      autoBtn.setAttribute('aria-pressed', String(on));
      autoBtn.style.background = on ? COLORS.ON : COLORS.OFF;
      autoBtn.style.color = on ? '#0a1320' : COLORS.DIGIT_INK;
    }
  }

  function pressButton(index){
    // 0..7 => N gombok, 8 => R gomb
    if (index === 8) { 
      toggleAutoMode();
    } else {
      // N gomb (0..7) toggle
      activeButtons[index] = !activeButtons[index];
      renderButtons();
      const newMask = maskFromButtons();    // 0..255
      // viewIndex most a teljes mask: lehetővé teszi a 256 állapot közötti váltást
      viewIndex = newMask;
      // biztosítjuk, hogy boardsState[viewIndex] létezzen (a TOTAL_STATES 256)
      if(!boardsState[viewIndex]) {
        boardsState[viewIndex] = defaultBoardState();
      }
      saveState();
      syncHUD();
      draw();
    }
  }

  // gombok eseménykezelői
  btns.forEach((btn, i)=>{
    if(btn){
      btn.addEventListener('click', (e)=>{ e.preventDefault(); pressButton(i); });
      btn.addEventListener('touchend', (e)=>{ e.preventDefault(); pressButton(i); }, {passive:false});
    }
  });

  function fitCanvas(){
    const outer=18, h1=document.querySelector('h1'), bar=document.querySelector('.bar');
    const h1H=h1?h1.getBoundingClientRect().height:0;
    const hudH=hud?hud.getBoundingClientRect().height:0;
    const barH=bar?bar.getBoundingClientRect().height:0;
    const safetyY=18;
    const maxW=Math.max(320, window.innerWidth-outer*2);
    const maxH=Math.max(260, window.innerHeight-(h1H+hudH+barH+safetyY+outer*2));
    grid.pad=Math.round(Math.max(10, Math.min(18, Math.min(maxW,maxH)*0.025)));
    const sizeFromW=Math.floor((maxW-(grid.pad*(grid.cols+1)))/grid.cols);
    const sizeFromH=Math.floor((maxH-(grid.pad*(grid.rows+1)))/grid.rows);
    const MAX_TILE=Math.min(96, Math.floor(window.innerWidth/5));
    grid.size=Math.min(MAX_TILE, Math.max(24, Math.min(sizeFromW,sizeFromH)));
    grid.radius = Math.max(6, Math.min(16, Math.floor(grid.size * 0.2))); // rounding effect
    const cssW=grid.cols*(grid.size+grid.pad)+grid.pad;
    const cssH=grid.rows*(grid.size+grid.pad)+grid.pad;
    frame.style.width=cssW+'px';
    canvas.style.width=cssW+'px';
    canvas.style.height=cssH+'px';
    canvas.width=Math.round(cssW*DPR);
    canvas.height=Math.round(cssH*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    document.documentElement.style.setProperty('--gap', grid.pad + 'px');
    const tileFont = Math.max(16, Math.floor(grid.size*0.42)) + 'px';
    btns.forEach(btn=>{
      if(btn){
        btn.style.width = grid.size + 'px';
        btn.style.height = grid.size + 'px';
        btn.style.borderRadius = grid.radius + 'px';
        btn.style.fontSize = tileFont;
      }
    });
    draw();
  }

  // Mentés / betöltés kibővítve 256 állapotra + 8 aktív gomb
  function saveState(){ 
    try{ 
      const toStore = {
        boardsState: boardsState.map(b => ({
          matrix: b.matrix,
          step: b.step,
          score: b.score
        })),
        activeButtons: [...activeButtons],
        viewIndex: viewIndex,
        version: '8N_256'
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toStore)); 
    }catch(e){} 
  }
  
  function loadState(){
    try{
      const s=localStorage.getItem(STORAGE_KEY);
      if(s){
        const st=JSON.parse(s);
        if(st && Array.isArray(st.boardsState) && st.boardsState.length===TOTAL_STATES){
          // validáljuk és visszaállítjuk
          const newBoards = st.boardsState.map((b)=>{
            if(!b || !b.matrix) return defaultBoardState();
            const matrixValid = b.matrix && b.matrix.length===ROWS && b.matrix[0]?.length===COLS;
            if(!matrixValid) return defaultBoardState();
            return {
              matrix: b.matrix.map(row=>[...row]),   // másolat
              step: typeof b.step === 'string' ? b.step : '0',
              score: typeof b.score === 'string' ? b.score : '0'
            };
          });
          boardsState = newBoards;
          if(Array.isArray(st.activeButtons) && st.activeButtons.length===8){
            activeButtons = st.activeButtons.map(Boolean);
          } else {
            activeButtons = [false,false,false,false,false,false,false,false];
          }
          if(typeof st.viewIndex==='number' && st.viewIndex>=0 && st.viewIndex<TOTAL_STATES){
            viewIndex = st.viewIndex;
          } else {
            viewIndex = maskFromButtons(); // szinkronizáljuk az aktív gombokkal
          }
          // Biztosítsuk, hogy a viewIndexen létezik állapot
          if(!boardsState[viewIndex]) boardsState[viewIndex] = defaultBoardState();
          return true;
        }
      }
    }catch(e){ localStorage.removeItem(STORAGE_KEY); }
    return false;
  }

  // Inicializáláskor, ha nincs mentett állapot, győződjünk meg róla, hogy a boardsState 256 elemből áll
  function initStateArrays(){
    if(boardsState.length !== TOTAL_STATES){
      const fresh = Array.from({length:TOTAL_STATES}, defaultBoardState);
      for(let i=0; i<Math.min(boardsState.length, TOTAL_STATES); i++){
        if(boardsState[i]) fresh[i] = boardsState[i];
      }
      boardsState = fresh;
    } else {
      for(let i=0; i<TOTAL_STATES; i++){
        if(!boardsState[i]) boardsState[i] = defaultBoardState();
      }
    }
    if(activeButtons.length !== 8){
      activeButtons = [false,false,false,false,false,false,false,false];
    }
    // viewIndex biztonság
    if(viewIndex<0 || viewIndex>=TOTAL_STATES) viewIndex = 0;
    if(!boardsState[viewIndex]) boardsState[viewIndex] = defaultBoardState();
  }

  // Átállítjuk a viewIndex-et az aktuális gomb kombinációnak megfelelően induláskor is
  function syncViewFromMask(){
    const m = maskFromButtons();
    viewIndex = m;
    if(!boardsState[viewIndex]) boardsState[viewIndex] = defaultBoardState();
  }

  // Eredeti kinézet, plusz az extra gombok teljes funkcionalitása
  window.addEventListener('resize', ()=>fitCanvas());
  window.addEventListener('orientationchange', ()=>fitCanvas());
  
  const loaded = loadState();
  if(!loaded){
    boardsState = Array.from({length:TOTAL_STATES}, defaultBoardState);
    activeButtons = [false,false,false,false,false,false,false,false];
    viewIndex = 0;
  }
  // Inicializálás és biztonsági ellenőrzések
  initStateArrays();
  // viewIndex helyesbítése az aktív gombok alapján (fontos, hogy a mentés után a gombállapot és a nézet összhangban legyen)
  const currentMaskFromLoaded = maskFromButtons();
  if(viewIndex !== currentMaskFromLoaded){
    // ha a mentésben az aktív gombok és a viewIndex nem passzol, akkor a gombok elsőbbséget élveznek
    viewIndex = currentMaskFromLoaded;
    if(!boardsState[viewIndex]) boardsState[viewIndex] = defaultBoardState();
  }
  
  renderButtons();
  syncHUD();
  draw();
  fitCanvas();
  
  // extra: ha viewIndex és a gombok között eltérés lehet később, de a pressButton mindig frissíti.
  // továbbá, auto mód esetén minden a jelenlegi nézeten történik (a feladat szerint)
})();
</script>
</body>
</html>
