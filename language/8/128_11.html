<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>◈ 128_11 • Template 7 ◈</title>
<style>
  :root{
    --bg:#0a0e1a; --tile-on:#3ec7c2; --tile-off:#1a2640;
    --ink:#e8eef8; --muted:#9fb3c8; --digit-ink:#e7f0ff; --gap:10px;
    --glow:#3ec7c280;
  }
  *{box-sizing:border-box;}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family: 'Inter', 'Segoe UI', system-ui, Roboto, Helvetica, Arial;
    display:flex; flex-direction:column; align-items:center;
    -webkit-tap-highlight-color: transparent;
  }
  h1{font-size:18px; font-weight:700; margin:10px 0 8px; letter-spacing:-0.2px; background:linear-gradient(135deg, #e0f0ff, #8fcbff); -webkit-background-clip:text; background-clip:text; color:transparent;}
  #frame{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .hud{
    width:100%; background:rgba(10,14,26,0.7); backdrop-filter:blur(2px);
    border-radius:28px; padding:8px 16px; display:flex; flex-direction:column; gap:8px;
    color:var(--muted); font-size:20px; font-weight:600; border:1px solid rgba(62,199,194,0.25);
  }
  .row{
    display:flex; align-items:baseline; justify-content:space-between;
    background:#0f1422; padding:4px 18px; border-radius:40px;
    gap:12px;
  }
  .label{white-space:nowrap; font-weight:500; letter-spacing:0.5px; font-size:16px;}
  .value{
    display:block; font-family:'JetBrains Mono', monospace; font-weight:600; 
    color:#b9f3f0; font-size:18px; line-height:1.3; text-align:right;
    word-break:break-word; white-space:normal; max-width:260px;
    transition:font-size 0.1s ease;
  }
  canvas{display:block; position:relative; filter:drop-shadow(0 6px 12px rgba(0,0,0,0.4));}
  .bar{
    width:100%; display:flex; justify-content:center; gap:var(--gap); flex-wrap:wrap;
    background:rgba(10,14,26,0.5); padding:6px 12px; border-radius:60px; backdrop-filter:blur(4px);
    margin-top:4px;
  }
  button{
    margin:0; padding:0; border:none; border-radius:0px;
    background:var(--tile-off); color:var(--digit-ink); font-weight:700;
    touch-action:manipulation; user-select:none;
    width:64px; height:64px; display:flex; align-items:center; justify-content:center;
    transition: all 0.08s cubic-bezier(0.2,0.9,0.4,1.1);
    font-family:'Inter', monospace; font-size:20px; letter-spacing:1px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
  }
  button:active{ transform:scale(0.94); }
  .btn-on{ background:var(--tile-on)!important; color:#0a1320!important; box-shadow:0 0 8px var(--glow); }
  @media (max-width:550px){
    .hud{padding:6px 12px; gap:6px;} .row{padding:2px 14px;}
    .label{font-size:14px;}
    .value{font-size:15px; max-width:180px;} h1{font-size:15px;}
    .bar{padding:4px 10px;}
  }
  @media (max-width:420px){
    .value{font-size:13px; max-width:150px;}
    .label{font-size:12px;}
    .bar{padding:3px 8px;}
  }
</style>
</head>
<body>
<h1>◈ 128_11 • Template 7 ◈</h1>
<div id="frame">
  <div class="hud" id="hud">
    <div class="row">
      <span class="label"> ✦ Step</span>
      <div id="sValue" class="value">0</div>
    </div>
    <div class="row">
      <span class="label"> ⚡ Score</span>
      <div id="mValue" class="value">0</div>
    </div>
  </div>
  <canvas id="stage" aria-label="16x8 Halo jelmező"></canvas>
  <div class="bar" id="buttonBar">
    <button id="n0">N0</button><button id="n1">N1</button><button id="n2">N2</button>
    <button id="n3">N3</button><button id="n4">N4</button><button id="n5">N5</button>
    <button id="n6">N6</button><button id="n7">N7</button>
    <button id="autoToggle">⦿ R ⦿</button>
  </div>
</div>
<script>
(()=> {
  const COLS=16, ROWS=8;        // 16x8 rács -> 128 cella
  const DPR=Math.max(1, Math.min(window.devicePixelRatio||1, 2));
  const canvas=document.getElementById('stage');
  const ctx=canvas.getContext('2d');
  
  // --- dinamikus CSS változók ---
  const cssVar = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const COLORS = {
    BG: cssVar('--bg'), ON: cssVar('--tile-on'), OFF: cssVar('--tile-off'),
    INK: cssVar('--ink'), DIGIT_INK: cssVar('--digit-ink')
  };
  
  // ========== 128 EGYEDI HALO-STÍLUSÚ IKON ==========
  const HALO_GLYPHS = [
    "ah", "bh", "ch", "dh", "eh", "fh", "gh", "hh", "ih", "jh", "kh", "lh", "mh", "nh", "oh", "ph",
    "ag", "bg", "cg", "dg", "eg", "fg", "gg", "hg", "ig", "jg", "kg", "lg", "mg", "ng", "og", "pg",
    "af", "bf", "cf", "df", "ef", "ff", "gf", "hf", "if", "jf", "kf", "lf", "mf", "nf", "of", "pf",
    "ae", "be", "ce", "de", "ee", "fe", "ge", "he", "ie", "je", "ke", "le", "me", "ne", "oe", "pe",
    "ad", "bd", "cd", "dd", "ed", "fd", "gd", "hd", "id", "jd", "kd", "ld", "md", "nd", "od", "pd",
    "ac", "bc", "cc", "dc", "ec", "fc", "gc", "hc", "ic", "jc", "kc", "lc", "mc", "nc", "oc", "pc",
    "ab", "bb", "cb", "db", "eb", "fb", "gb", "hb", "ib", "jb", "kb", "lb", "mb", "nb", "ob", "pb",
    "aa", "ba", "ca", "da", "ea", "fa", "ga", "ha", "ia", "ja", "ka", "la", "ma", "na", "oa", "pa",
  ];
  while(HALO_GLYPHS.length < 128) HALO_GLYPHS.push("⦿");
  const UNIQUE_SYMBOLS = HALO_GLYPHS.slice(0, 128);
  
  // --------- grid geometria ----
  const grid = { cols:COLS, rows:ROWS, size:0, pad:10, radius:0 };
  
  function emptyMatrix(){ return Array.from({length:grid.rows},()=>Array(grid.cols).fill(false)); }
  const defaultBoardState = () => ({ matrix: emptyMatrix(), step: "0", score: "0" });
  
  const BOARD_COUNT = 256;
  let boardsState = Array.from({length:BOARD_COUNT}, defaultBoardState);
  let activeButtons = Array(8).fill(false);
  let viewIndex = 0;
  let autoToggleInterval = null;
  let isAutoToggleActive = false;
  
  const elM = document.getElementById('mValue');
  const elS = document.getElementById('sValue');
  const btns = [];
  for(let i=0;i<8;i++) btns.push(document.getElementById(`n${i}`));
  btns.push(document.getElementById('autoToggle'));
  
  // ---- BIG INTEGER ARITMETIKA ----
  const stripZeros = (s)=>{
    let t = (s||'0').replace(/^(-?)0+(?=\d)/, '$1');
    return t === '' ? '0' : t;
  };
  const splitSign = (s)=> s[0]==='-' ? [-1, s.slice(1)] : [1, s];
  const cmpAbs = (a,b)=>{
    if(a.length !== b.length) return a.length - b.length;
    if(a===b) return 0;
    return a<b ? -1 : 1;
  };
  const addAbs = (a,b)=>{
    a=stripZeros(a); b=stripZeros(b);
    let res='', carry=0, i=a.length-1, j=b.length-1;
    while(i>=0||j>=0||carry){
      const da=i>=0?(a.charCodeAt(i)-48):0;
      const db=j>=0?(b.charCodeAt(j)-48):0;
      const s=da+db+carry;
      res=(s%10)+res; carry=(s/10)|0; i--; j--;
    }
    return stripZeros(res);
  };
  const subAbs = (a,b)=>{
    a=stripZeros(a); b=stripZeros(b);
    let res='', borrow=0, i=a.length-1, j=b.length-1;
    while(i>=0){
      let da = a.charCodeAt(i)-48-borrow;
      const db = j>=0?(b.charCodeAt(j)-48):0;
      if(da < db){ da+=10; borrow=1; } else borrow=0;
      res = (da-db) + res; i--; j--;
    }
    return stripZeros(res.replace(/^0+(?=\d)/,''));
  };
  const addSigned = (A,B)=>{
    let [sa, a] = splitSign(stripZeros(A));
    let [sb, b] = splitSign(stripZeros(B));
    if(a==='0' && sa===1) return (sb<0?'-':'')+b;
    if(b==='0' && sb===1) return (sa<0?'-':'')+a;
    if(sa===sb){
      const s = addAbs(a,b);
      return (sa<0?'-':'')+s;
    } else {
      const cmp = cmpAbs(a,b);
      if(cmp===0) return '0';
      if(cmp>0){
        const s = subAbs(a,b);
        return (sa<0?'-':'')+s;
      } else {
        const s = subAbs(b,a);
        return (sb<0?'-':'')+s;
      }
    }
  };
  const incUnsigned = (A)=> stripZeros(addAbs(stripZeros(A), '1'));
  const halfUnsigned = (A)=>{
    let Astr = stripZeros(A);
    let res='', carry=0;
    for(let i=0;i<Astr.length;i++){
      const n = carry*10 + (Astr.charCodeAt(i)-48);
      const q = (n/2)|0;
      res += String(q);
      carry = n%2;
    }
    return stripZeros(res);
  };
  const isBoardEmpty = (m)=>{
    for(let r=0;r<m.length;r++) for(let c=0;c<m[r].length;c++) if(m[r][c]) return false;
    return true;
  };
  
  // ---- MASZK KEZELÉS ----
  function maskFromButtons(){
    let mask=0;
    for(let i=0;i<8;i++) if(activeButtons[i]) mask |= (1<<i);
    return mask;
  }
  function updateViewIndexFromMask(){ viewIndex = maskFromButtons(); }
  
  // DINAMIKUS BETŰMÉRET (kisebb alapértékekkel)
  function adjustFontSize(el, text){
    if(!el) return;
    const container = el.parentElement;
    if(!container) return;
    const containerWidth = container.clientWidth - 20;
    if(containerWidth <= 0) return;
    let fontSize = 18;
    if(window.innerWidth <= 550) fontSize = 15;
    if(window.innerWidth <= 420) fontSize = 13;
    const testSpan = document.createElement('span');
    testSpan.style.cssText = `font-family:'JetBrains Mono', monospace; font-weight:600; white-space:nowrap; position:absolute; visibility:hidden; font-size:${fontSize}px;`;
    testSpan.innerText = text;
    document.body.appendChild(testSpan);
    let textWidth = testSpan.offsetWidth;
    while(textWidth > containerWidth && fontSize > 10){
      fontSize--;
      testSpan.style.fontSize = fontSize + 'px';
      textWidth = testSpan.offsetWidth;
    }
    document.body.removeChild(testSpan);
    el.style.fontSize = fontSize + 'px';
    el.style.whiteSpace = 'normal';
    el.style.wordBreak = 'break-word';
  }
  
  function renderValue(el, v){
    el.innerHTML = v;
    adjustFontSize(el, v);
  }
  
  function syncHUD(){
    const b = boardsState[viewIndex];
    if(b){
      renderValue(elM, b.score);
      renderValue(elS, b.step);
    } else {
      renderValue(elM, "0");
      renderValue(elS, "0");
    }
  }
  
  // CELLAKAPCSOLÁS
  function toggleCell(r,c){
    const b = boardsState[viewIndex];
    if(!b) return;
    const wasOn = b.matrix[r][c];
    b.matrix[r][c] = !wasOn;
    b.step = incUnsigned(b.step);
    b.score = wasOn ? addSigned(b.score, "2") : addSigned(b.score, "-1");
    if(isBoardEmpty(b.matrix) && b.step !== "0"){
      b.score = halfUnsigned(b.step);
    }
    syncHUD();
    draw();
  }
  
  // AUTOMATA
  function toggleRandomCell(){
    if(!isAutoToggleActive) return;
    const r = Math.floor(Math.random() * grid.rows);
    const c = Math.floor(Math.random() * grid.cols);
    toggleCell(r,c);
  }
  function startAutoToggle(){
    if(autoToggleInterval) return;
    isAutoToggleActive = true;
    autoToggleInterval = setInterval(toggleRandomCell, 200);
  }
  function stopAutoToggle(){
    isAutoToggleActive = false;
    if(autoToggleInterval){ clearInterval(autoToggleInterval); autoToggleInterval = null; }
  }
  function toggleAutoMode(){
    if(isAutoToggleActive) stopAutoToggle();
    else startAutoToggle();
    renderButtons();
  }
  
  // RAJZOLÁS
  function getCellSymbol(row, col){
    const idx = (row * COLS + col) % 128;
    return UNIQUE_SYMBOLS[idx];
  }
  
  function drawHaloSymbol(cx, cy, symbol, isOn){
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const fontSize = Math.max(20, Math.floor(grid.size * 0.52));
    ctx.font = `500 ${fontSize}px "Segoe UI Symbol", "Apple Symbols", "Noto Sans Symbols2", "Inter"`;
    if(isOn){
      ctx.shadowBlur = 8;
      ctx.shadowColor = "#3ec7c2";
      ctx.fillStyle = "#0a1425";
    } else {
      ctx.shadowBlur = 3;
      ctx.shadowColor = "#3ec7c280";
      ctx.fillStyle = COLORS.DIGIT_INK;
    }
    ctx.fillText(symbol, cx, cy);
    ctx.shadowBlur = 0;
  }
  
  function roundedRect(x,y,w,h,r){
    const rad = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rad, y);
    ctx.lineTo(x+w-rad, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+rad);
    ctx.lineTo(x+w, y+h-rad);
    ctx.quadraticCurveTo(x+w, y+h, x+w-rad, y+h);
    ctx.lineTo(x+rad, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-rad);
    ctx.lineTo(x, y+rad);
    ctx.quadraticCurveTo(x, y, x+rad, y);
    ctx.closePath();
  }
  
  function draw(){
    const b = boardsState[viewIndex];
    if(!b) return;
    ctx.clearRect(0,0,canvas.width/DPR, canvas.height/DPR);
    ctx.fillStyle = COLORS.BG;
    ctx.fillRect(0,0,canvas.width/DPR, canvas.height/DPR);
    
    for(let r=0; r<grid.rows; r++){
      for(let c=0; c<grid.cols; c++){
        const x = c*(grid.size+grid.pad)+grid.pad;
        const y = r*(grid.size+grid.pad)+grid.pad;
        const isOn = b.matrix[r][c];
        ctx.fillStyle = isOn ? COLORS.ON : COLORS.OFF;
        roundedRect(x, y, grid.size, grid.size, grid.radius);
        ctx.fill();
        ctx.strokeStyle = isOn ? 'rgba(100,230,220,0.7)' : 'rgba(80,130,200,0.3)';
        ctx.lineWidth = 1.2;
        roundedRect(x+1.5, y+1.5, grid.size-3, grid.size-3, grid.radius-1);
        ctx.stroke();
        
        const symbol = getCellSymbol(r,c);
        const centerX = x + grid.size/2;
        const centerY = y + grid.size/2;
        drawHaloSymbol(centerX, centerY, symbol, isOn);
        

      }
    }
  }
  
  // ESEMÉNYEK
  function pointerXY(e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const y = (e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    return {x,y};
  }
  function toggleAt(x,y){
    for(let r=0;r<grid.rows;r++){
      for(let c=0;c<grid.cols;c++){
        const cx = c*(grid.size+grid.pad)+grid.pad;
        const cy = r*(grid.size+grid.pad)+grid.pad;
        if(x>=cx && x<=cx+grid.size && y>=cy && y<=cy+grid.size){
          toggleCell(r,c);
          return;
        }
      }
    }
  }
  canvas.addEventListener('click', e=>{ const p=pointerXY(e); toggleAt(p.x,p.y); });
  let touchMoved=false;
  canvas.addEventListener('touchstart', ()=>{ touchMoved=false; }, {passive:true});
  canvas.addEventListener('touchmove', ()=>{ touchMoved=true; }, {passive:true});
  canvas.addEventListener('touchend', e=>{ if(!touchMoved){ const p=pointerXY(e); toggleAt(p.x,p.y); } }, {passive:true});
  
  function renderButtons(){
    for(let i=0;i<8;i++){
      const btn = btns[i];
      const on = !!activeButtons[i];
      if(btn){
        btn.classList.toggle('btn-on', on);
        btn.style.background = on ? COLORS.ON : COLORS.OFF;
        btn.style.color = on ? '#0a1320' : COLORS.DIGIT_INK;
      }
    }
    const autoBtn = btns[8];
    if(autoBtn){
      const onAuto = isAutoToggleActive;
      autoBtn.classList.toggle('btn-on', onAuto);
      autoBtn.style.background = onAuto ? COLORS.ON : COLORS.OFF;
      autoBtn.style.color = onAuto ? '#0a1320' : COLORS.DIGIT_INK;
    }
  }
  
  function pressButton(idx){
    if(idx === 8){
      toggleAutoMode();
      return;
    }
    activeButtons[idx] = !activeButtons[idx];
    renderButtons();
    updateViewIndexFromMask();
    if(viewIndex < 0) viewIndex = 0;
    if(viewIndex >= BOARD_COUNT) viewIndex = BOARD_COUNT-1;
    if(!boardsState[viewIndex]) boardsState[viewIndex] = defaultBoardState();
    syncHUD();
    draw();
  }
  
  for(let i=0;i<btns.length;i++){
    const btn = btns[i];
    if(!btn) continue;
    const idx = i;
    btn.addEventListener('click', (e)=>{ e.preventDefault(); pressButton(idx); });
    btn.addEventListener('touchend', (e)=>{ e.preventDefault(); pressButton(idx); }, {passive:false});
  }
  
  function fitCanvas(){
    const outer=24;
    const h1h = document.querySelector('h1')?.getBoundingClientRect().height || 0;
    const hudH = document.getElementById('hud')?.getBoundingClientRect().height || 0;
    const barH = document.querySelector('.bar')?.getBoundingClientRect().height || 0;
    const safeY = 20;
    const maxW = Math.max(340, window.innerWidth - outer*2);
    const maxH = Math.max(280, window.innerHeight - (h1h + hudH + barH + safeY + outer));
    grid.pad = Math.round(Math.max(8, Math.min(18, Math.min(maxW, maxH) * 0.022)));
    const sizeFromW = Math.floor((maxW - (grid.pad*(grid.cols+1))) / grid.cols);
    const sizeFromH = Math.floor((maxH - (grid.pad*(grid.rows+1))) / grid.rows);
    const MAX_TILE = Math.min(90, Math.floor(window.innerWidth/5.5));
    grid.size = Math.min(MAX_TILE, Math.max(26, Math.min(sizeFromW, sizeFromH)));
    grid.radius = Math.max(5, Math.floor(grid.size * 0.13));
    const cssW = grid.cols*(grid.size+grid.pad)+grid.pad;
    const cssH = grid.rows*(grid.size+grid.pad)+grid.pad;
    const frameDiv = document.getElementById('frame');
    if(frameDiv) frameDiv.style.width = cssW+'px';
    canvas.style.width = cssW+'px';
    canvas.style.height = cssH+'px';
    canvas.width = Math.round(cssW * DPR);
    canvas.height = Math.round(cssH * DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    document.documentElement.style.setProperty('--gap', grid.pad + 'px');
    const btnFont = Math.max(15, Math.floor(grid.size*0.38)) + 'px';
    for(let btn of btns){
      if(btn){
        btn.style.width = grid.size+'px';
        btn.style.height = grid.size+'px';
        btn.style.borderRadius = Math.max(5, grid.radius)+'px';
        btn.style.fontSize = btnFont;
        btn.style.fontWeight = 'bold';
      }
    }
    draw();
    const b = boardsState[viewIndex];
    if(b){
      adjustFontSize(elM, b.score);
      adjustFontSize(elS, b.step);
    }
  }
  
  // INICIALIZÁCIÓ - tiszta állapot, nincs mentés
  function fullInit() {
    boardsState = Array.from({length:BOARD_COUNT}, defaultBoardState);
    activeButtons = Array(8).fill(false);
    viewIndex = 0;
    
    renderButtons();
    syncHUD();
    setTimeout(() => { fitCanvas(); }, 0);
    setTimeout(() => { fitCanvas(); }, 100);
  }
  
  // ablakméret változás
  window.addEventListener('resize', ()=>{
    fitCanvas();
    const b = boardsState[viewIndex];
    if(b){
      adjustFontSize(elM, b.score);
      adjustFontSize(elS, b.step);
    }
  });
  window.addEventListener('orientationchange', ()=>{
    setTimeout(()=>{
      fitCanvas();
      const b = boardsState[viewIndex];
      if(b){
        adjustFontSize(elM, b.score);
        adjustFontSize(elS, b.step);
      }
    }, 50);
  });
  
  // Indítás
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fullInit);
  } else {
    fullInit();
  }
  window.addEventListener('load', () => fitCanvas());
})();
</script>
</body>
</html>
